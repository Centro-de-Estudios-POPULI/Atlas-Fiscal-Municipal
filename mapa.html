<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bolivia · Atlas Fiscal Municipal</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --f:"Inter",system-ui,sans-serif;--fd:"Fraunces",Georgia,serif;
  --red:#c71e1d;--red-dk:#9b2226;--orange:#df5d25;--amber:#ee9b00;
  --mint:#94d2bd;--teal:#0a9396;--teal-dk:#005f73;--ink:#001219;
  /* IDENTIDAD DEL ATLAS FISCAL: top bar OXBLOOD derivado del rojo POPULI #9b2226.
     El Atlas Socioeconómico usa teal #013a46 -> se leen como familia, no como copia.
     Acento en arena #e9d8a6 (el mint del otro chirría sobre vino). */
  --topbar:#5c1618;--arena:#e9d8a6;
  --fondo:#f2efe8;--glass:#fffefbdb;--gris-card:#f1ede3;--linea:#ddd6c9;--linea-2:#eae4d7;
  --tx:#16232c;--suave:#5f6f79;--faint:#93a3ac;--sel:#005f73;--warm:#ee9b00;--peek:138px;
  --sh:0 1px 0 #12203508,0 10px 30px #12203512;
  --card-solid:#fff;--card-hov:#f7f9fa;--kpi-on:#f6fbfc;--foot-bg:#ffffff88;
  --topline:#3f0e10;--sheet-fade:#fffefbf2;
}
/* ── MODO OSCURO ── mismos tokens, valores nocturnos (el canvas se repinta desde JS) */
body.dark{
  color-scheme:dark;
  --orange:#f0834a;--teal-dk:#5cc3c9;--sel:#43b3bd;--topbar:#3d0e10;--topline:#5c1618;
  --fondo:#0b1318;--glass:#131f26e6;--gris-card:#16242c;--linea:#2b3d47;--linea-2:#22323b;
  --tx:#e9eff2;--suave:#a1b3bd;--faint:#6f8794;
  --card-solid:#1b2a33;--card-hov:#20313b;--kpi-on:#17323a;--foot-bg:#0f1a2040;
  --sheet-fade:#131f26f2;
  --sh:0 1px 0 #0000004d,0 12px 34px #00000073;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--fondo);color:var(--tx);font-family:var(--f);font-size:13px;
  font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;
  transition:background-color .3s ease,color .3s ease}
#mapbox{position:fixed;inset:0}
#map-wrap{position:absolute;inset:0}
#map-wrap canvas{position:absolute;inset:0;width:100%;height:100%}
#pick{display:none}
#fade{pointer-events:none;opacity:0}
/* transiciones sutiles: entrada escalonada de tarjetas y KPIs */
@keyframes cardIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes kpiIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes softIn{from{opacity:0}to{opacity:1}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
#catch{position:absolute;inset:0;z-index:5;cursor:grab}#catch:active{cursor:grabbing}

/* TOP BAR */
#top{position:fixed;top:0;left:0;right:0;height:54px;z-index:14;display:flex;align-items:center;gap:12px;
  padding:0 15px;background:var(--topbar);border-bottom:1px solid var(--topline);color:#fff;
  transition:background-color .3s ease,border-color .3s ease}
/* botón de tema */
.tbtog{width:27px;height:27px;flex:none;display:grid;place-items:center;cursor:pointer;color:#fff;
  border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);transition:background .18s,border-color .18s}
.tbtog:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.4)}
.tbtog svg{width:14px;height:14px;display:block}
.tbtog .ic-sun{display:none}
body.dark .tbtog .ic-moon{display:none}body.dark .tbtog .ic-sun{display:block}
.logo{width:32px;height:32px;display:grid;place-items:center;flex-shrink:0}
.logo svg{width:32px;height:32px}
.t-tit{display:flex;flex-direction:column;line-height:1.05}
.t-h{font-size:.86rem;font-weight:700;letter-spacing:-.01em}
.t-h b{color:var(--warm);font-weight:700}
.t-name{font-size:.58rem;color:rgba(255,255,255,.6);font-weight:500;margin-top:2px;letter-spacing:.02em}
.top-sp{flex:1}
/* desplegable dept (estilo del de categorías) */
.tbdd{position:relative;font-size:.66rem;color:rgba(255,255,255,.7);font-weight:500}
.tbdd .lab{margin-right:6px}
.tbbtn{background:none;border:0;border-bottom:1.5px dotted rgba(255,255,255,.4);color:#fff;font-family:var(--f);
  font-size:.72rem;font-weight:600;cursor:pointer;padding:0 2px 3px;display:inline-flex;align-items:center;gap:5px}
.tbbtn .ar{color:rgba(255,255,255,.6);font-size:.7rem;transition:transform .2s}
.tbdd.open .ar{transform:rotate(180deg)}
.tbdrop{display:none;position:absolute;right:0;top:100%;margin-top:6px;z-index:30;background:var(--card-solid);color:var(--tx);
  border:1px solid var(--linea);box-shadow:var(--sh);min-width:11rem;max-height:17rem;overflow:auto;scrollbar-width:none}
.tbdd.open .tbdrop{display:block}
.tbop{padding:6px 12px;font-size:.72rem;font-weight:500;cursor:pointer;border-top:1px solid var(--linea-2);white-space:nowrap}
.tbop:first-child{border-top:0}.tbop:hover{background:var(--gris-card)}.tbop.on{color:var(--sel);font-weight:700}
.t-s{font-size:.62rem;color:rgba(255,255,255,.6);font-weight:500;margin-left:12px}.t-s b{color:var(--arena);font-weight:700}
/* stepper de año: eje primario del atlas fiscal, siempre a la vista */
.yr{display:flex;align-items:center;gap:2px;flex:none;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06)}
.yr button{width:22px;height:25px;border:0;background:none;color:#fff;font-size:.8rem;cursor:pointer;font-family:var(--f);line-height:1}
.yr button:hover:not(:disabled){background:rgba(255,255,255,.16)}
.yr button:disabled{opacity:.28;cursor:default}
.yr .yv{min-width:3.1rem;text-align:center;font-size:.82rem;font-weight:700;color:var(--arena);letter-spacing:.01em;cursor:pointer;padding:0 2px}
.yr .yv small{display:block;font-size:.46rem;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;margin-top:-2px}
.yrdd{position:relative;flex:none}
.yrdrop{display:none;position:absolute;right:0;top:100%;margin-top:6px;z-index:30;background:var(--card-solid);color:var(--tx);
  border:1px solid var(--linea);box-shadow:var(--sh);min-width:6.5rem;max-height:17rem;overflow:auto;scrollbar-width:none}
.yrdd.open .yrdrop{display:block}
.yrop{padding:6px 14px;font-size:.74rem;font-weight:600;cursor:pointer;border-top:1px solid var(--linea-2);text-align:center}
.yrop:first-child{border-top:0}.yrop:hover{background:var(--gris-card)}.yrop.on{color:var(--sel);font-weight:800}

/* PANELES */
.panel{position:fixed;top:62px;bottom:12px;width:20.5rem;z-index:8;background:var(--glass);
  border:1px solid var(--linea);box-shadow:var(--sh);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  display:flex;flex-direction:column;overflow:hidden;transition:background-color .3s ease,border-color .3s ease}
#panel-ind{left:12px}#panel-det{right:12px;display:none}.grip-bar,.pk{display:none}
.p-body{flex:1;overflow:auto;scrollbar-width:none;padding:13px 14px}.p-body::-webkit-scrollbar{display:none}
.p-foot{padding:10px 14px;border-top:1px solid var(--linea-2);font-size:.56rem;color:var(--suave);font-weight:500;line-height:1.8;background:var(--foot-bg)}
.p-foot a{color:var(--teal-dk);text-decoration:none;font-weight:700}.p-foot a:hover{text-decoration:underline}.p-foot .sep{color:var(--faint);margin:0 5px}
.cat-bar{padding:11px 14px;border-bottom:1px solid var(--linea-2);position:relative}
.p-kick{font-size:.55rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.kick-n{font-size:.94em;letter-spacing:0;text-transform:none;font-weight:600;color:var(--faint);white-space:nowrap;min-width:0;overflow:hidden;text-overflow:ellipsis}
.p-kick>span:first-child{flex:none}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;background:none;
  border:0;border-bottom:2px dotted var(--linea);padding:0 0 6px;font-family:var(--f)}
.cat-btn .cn{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
.cat-btn .ar{color:var(--suave);transition:transform .2s}
.cat-bar.open .cat-btn .ar{transform:rotate(180deg)}
.cat-drop{display:none;position:absolute;left:14px;right:14px;top:100%;z-index:20;background:var(--card-solid);
  border:1px solid var(--linea);box-shadow:var(--sh);max-height:min(28rem,66vh);overflow:auto;scrollbar-width:none}
.cat-bar.open .cat-drop{animation:softIn .16s ease both}
.cat-bar.open .cat-drop{display:block}
.cat-op{padding:7px 12px;font-size:.72rem;font-weight:500;cursor:pointer;border-top:1px solid var(--linea-2);display:flex;justify-content:space-between;align-items:center;gap:10px}
.co-n{color:var(--faint);font-weight:600;font-size:.9em;flex:none}
.cat-op:first-child{border-top:0}.cat-op:hover{background:var(--gris-card)}
.cat-op.on{color:var(--sel);font-weight:700}.cat-op.off{color:var(--faint);cursor:not-allowed}
.p-sub{font-size:.66rem;color:var(--suave);font-weight:500;margin:2px 0 0}

.lista{display:flex;flex-direction:column;gap:8px;margin-top:11px}
.ind{display:grid;grid-template-columns:minmax(0,1fr) 110px;align-items:center;gap:.7rem;text-align:left;
  cursor:pointer;width:100%;padding:.72rem;border:1px solid var(--linea-2);background:var(--gris-card);color:inherit;
  transition:background-color .22s ease,border-color .22s ease,box-shadow .22s ease;
  animation:cardIn .36s cubic-bezier(.2,.7,.3,1) both;animation-delay:var(--d,0ms)}
.ind:hover{background:var(--card-hov)}
.ind.on{background:var(--card-solid);border-color:var(--sel);box-shadow:inset 3px 0 0 var(--sel)}
.i-nm{font-size:.83rem;font-weight:600;line-height:1.22;letter-spacing:-.005em}
.i-df{font-size:.69rem;color:var(--suave);line-height:1.32;margin-top:.3rem;font-weight:500}
.mini{width:110px;height:80px;flex:none;pointer-events:none;opacity:.6;filter:saturate(.32);transition:opacity .28s ease,filter .28s ease}
.ind:hover .mini{opacity:.9;filter:saturate(.7)}
.ind.on .mini{opacity:1;filter:saturate(.88)}
/* en oscuro la desaturación tira a pardo: se apagan con brillo en vez de con saturación */
body.dark .mini{opacity:.42;filter:saturate(.55) brightness(.9)}
body.dark .ind:hover .mini{opacity:.8;filter:saturate(.85) brightness(.98)}
body.dark .ind.on .mini{opacity:1;filter:none}

.det-head{padding:14px;border-bottom:1px solid var(--linea-2)}
.d-mun{font-family:var(--fd);font-size:1.28rem;font-weight:600;letter-spacing:-.01em;line-height:1.02}
.d-sub{font-size:.61rem;color:var(--suave);font-weight:500;margin-top:5px}
.d-links{display:block;margin-top:3px}.d-links .sep{color:var(--faint);margin:0 5px}
.back{color:var(--teal-dk);cursor:pointer;font-weight:700;text-decoration:none}.back:hover{text-decoration:underline}
/* serie 2016-2025 del indicador en pantalla, contra el promedio nacional */
.serie{border:1px solid var(--linea-2);background:var(--card-solid);padding:9px 10px 4px;margin-bottom:9px}
.sr-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px}
.sr-t{font-size:.63rem;font-weight:700;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-u{font-size:.53rem;color:var(--faint);font-weight:600;flex:none}
.sr-lg{display:flex;gap:11px;font-size:.53rem;color:var(--suave);font-weight:600;margin:3px 0 1px}
.sr-lg i{display:inline-block;width:13px;height:0;border-top:2.5px solid currentColor;vertical-align:middle;margin-right:4px;font-style:normal}
.sr-lg .mu{color:var(--sel)}.sr-lg .na{color:var(--faint)}
.sr-svg{display:block;width:100%;height:96px;overflow:visible}
.sr-svg .gl{stroke:var(--linea-2);stroke-width:1}
.sr-svg .zero{stroke:var(--faint);stroke-width:1;stroke-dasharray:2 2}
.sr-svg .ln-na{fill:none;stroke:var(--faint);stroke-width:1.6;stroke-dasharray:3.5 2.5}
.sr-svg .ln-mu{fill:none;stroke:var(--sel);stroke-width:2.2;stroke-linejoin:round;stroke-linecap:round}
.sr-svg .dot{fill:var(--sel)}
.sr-svg .dot-now{fill:var(--warm);stroke:var(--card-solid);stroke-width:1.6}
.sr-svg .ax{fill:var(--faint);font-size:7.5px;font-weight:600;font-family:var(--f)}
.sr-svg .gap{fill:none;stroke:var(--sel);stroke-width:1.4;stroke-dasharray:2 2;opacity:.55}
.sr-foot{font-size:.5rem;color:var(--faint);font-weight:500;line-height:1.35;margin-top:1px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--linea-2);border:1px solid var(--linea-2)}
.kpi{background:var(--card-solid);padding:.5rem .6rem;cursor:pointer;border-top:2px solid var(--teal);
  transition:background-color .22s ease,border-color .22s ease;
  animation:kpiIn .34s cubic-bezier(.2,.7,.3,1) both;animation-delay:var(--d,0ms)}
.kpi:hover{background:var(--card-hov)}.kpi.on{border-top-color:var(--sel);background:var(--kpi-on)}
.k-l{font-size:.57rem;color:var(--suave);line-height:1.15;height:2.3em;overflow:hidden;font-weight:600}
.k-v{font-size:.96rem;font-weight:700;letter-spacing:-.02em;margin-top:.15rem}
.k-c{margin-top:.3rem;padding-top:.26rem;border-top:1px solid var(--linea-2);display:flex;flex-direction:column;gap:.06rem}
.k-c span{font-size:.55rem;color:var(--suave);display:flex;justify-content:space-between;font-weight:500}
.k-c .up{color:var(--teal-dk);font-weight:700}.k-c .dn{color:var(--orange);font-weight:700}

.zc{position:fixed;z-index:9;right:calc(20.5rem + 26px);bottom:24px;display:flex;flex-direction:column;
  border:1px solid var(--linea);background:var(--glass);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);box-shadow:var(--sh)}
.zc button{width:30px;height:30px;border:0;background:none;font-size:1rem;cursor:pointer;color:var(--tx);border-bottom:1px solid var(--linea-2);font-family:var(--f)}
.zc button:last-child{border-bottom:0;font-size:.7rem}.zc button:hover{background:var(--gris-card)}

.termo{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:8;
  width:min(34rem,calc(100vw - 47rem));background:var(--glass);border:1px solid var(--linea);box-shadow:var(--sh);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);padding:.5rem .85rem}
.tm-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.35rem}
.tm-t{font-size:.68rem;font-weight:700}.tm-t small{color:var(--faint);font-weight:500;margin-left:.25rem}
.tm-st{font-size:.55rem;color:var(--suave);font-weight:500}.tm-st b{color:var(--tx);font-weight:700}
.tm-row{display:flex;align-items:center;gap:9px}
.tm-side{font-size:.58rem;color:var(--tx);font-weight:700;white-space:nowrap;flex:none}
.tm-side .cap{color:var(--faint);font-weight:500}
.tm-bar{flex:1;height:8px;position:relative;border-radius:1px}
.tm-mk{position:absolute;top:-2px;width:1px;height:12px;background:var(--suave)}
.termo.swap .tm-t,.termo.swap .tm-st,.termo.swap .tm-side{animation:softIn .34s ease both}

/* créditos */
.cred{position:fixed;left:16px;bottom:16px;z-index:7;font-size:.58rem;color:var(--suave);font-weight:500;
  background:var(--glass);border:1px solid var(--linea);padding:5px 10px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.cred a{color:var(--teal-dk);text-decoration:none;font-weight:700}.cred a:hover{text-decoration:underline}
.cred .sep{color:var(--faint);margin:0 5px}

#pop{position:fixed;pointer-events:none;z-index:20;opacity:0;transition:opacity .1s;background:var(--glass);
  border:1px solid var(--linea);box-shadow:0 10px 30px #12203522;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);padding:.55rem .7rem;min-width:11rem}
#pop .pn{font-size:.8rem;font-weight:700;letter-spacing:-.01em}#pop .pd{font-size:.55rem;color:var(--suave);font-weight:500;margin-top:1px}
#pop .pv{display:flex;align-items:baseline;gap:.35rem;margin-top:.38rem}#pop .pv b{font-size:1.02rem;font-weight:700;color:var(--teal-dk)}#pop .pv small{font-size:.54rem;color:var(--faint)}
#pop .pr{font-size:.55rem;color:var(--suave);margin-top:.3rem;padding-top:.3rem;border-top:1px solid var(--linea-2);display:flex;justify-content:space-between}#pop .pr b{color:var(--tx);font-weight:700}
@media(max-width:1280px) and (min-width:821px){#panel-det,.zc{display:none!important}.termo{width:min(28rem,calc(100vw-25rem))}}
@media(max-width:820px){
  #top{height:48px;padding:0 11px;gap:8px}
  .logo{width:26px;height:26px}.logo svg{width:26px;height:26px}
  .t-tit{flex:1;min-width:0}.t-h{font-size:.72rem;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t-name{display:none}.top-sp{display:none}.t-s{display:none}
  .tbdd{flex:none}.tbdd .lab{display:none}.tbbtn{font-size:.7rem;padding-bottom:2px}
  /* el stepper de año se compacta para no comerse el título */
  .yr .yv{min-width:2.5rem;font-size:.75rem}.yr .yv small{display:none}
  .yr button{width:18px;height:22px;font-size:.72rem}
  .tbdrop{min-width:min(13rem,calc(100vw - 22px));max-height:60vh}
  /* franja superior: categoría + tira de tarjetas (mini-mapa + nombre + definición) */
  #panel-ind{top:48px;left:0;right:0;bottom:auto;width:auto;height:150px;border:0;border-bottom:1px solid var(--linea);flex-direction:column;overflow:visible}
  .cat-bar{padding:7px 12px}.cat-btn .cn{font-size:.95rem}
  .cat-drop{max-height:64vh;box-shadow:0 14px 30px rgba(16,26,20,.22)}.cat-op{padding:11px 13px;font-size:.82rem}
  .p-body{padding:8px 0 8px 12px;overflow:hidden;flex:1}.p-sub{display:none}
  .lista{flex-direction:row;overflow-x:auto;overflow-y:hidden;gap:9px;margin-top:0;height:100%;scroll-snap-type:x proximity;padding-right:12px}
  .ind{display:grid;grid-template-columns:minmax(0,1fr) 82px;align-items:center;gap:.5rem;min-width:196px;max-width:196px;padding:.55rem;scroll-snap-align:start;height:calc(100% - 3px);overflow:hidden}
  .mini{width:82px;height:auto;aspect-ratio:110/80;opacity:.95}
  .i-nm{font-size:.73rem;line-height:1.16;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .i-df{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:.6rem;line-height:1.32;margin-top:.2rem;font-weight:500}
  /* mapa: SIEMPRE completo; la ficha flota por encima (no se re-renderiza) */
  #mapbox{inset:auto;top:202px;left:0;right:0;bottom:0}
  .termo{left:8px;right:8px;transform:none;width:auto;bottom:8px;padding:.45rem .7rem;transition:opacity .2s}
  body.sheet-open .termo{opacity:0;pointer-events:none}
  .tm-t{font-size:.66rem}.tm-t small{font-size:.52rem}.tm-st{display:none}.tm-side{font-size:.58rem}
  .zc{right:8px;bottom:12px;transition:bottom .28s cubic-bezier(.22,.61,.36,1)}
  body.sheet-open .zc{bottom:calc(var(--peek) + 16px)}
  /* ── ficha municipal = bottom-sheet deslizable (peek / full) ── */
  /* altura = 74vh (JS la fija en px exactos) para que el detent "full" quepa ENTERO en pantalla:
     antes medía 88vh y bajaba 26vh -> la cola de la lista quedaba fuera de la pantalla y se cortaba */
  #panel-det{display:flex!important;top:auto;bottom:0;left:0!important;right:0!important;width:auto!important;height:74vh;
    border:0;border-radius:16px 16px 0 0;box-shadow:0 -12px 34px rgba(16,26,20,.20);
    transform:translateY(100%);transition:transform .32s cubic-bezier(.22,.61,.36,1),background-color .3s ease;z-index:60}
  #panel-det.dragging{transition:none}
  /* degradado al pie = pista de que aún hay contenido; se apaga al llegar al final */
  #panel-det::after{content:"";position:absolute;left:0;right:0;bottom:0;height:38px;pointer-events:none;z-index:2;
    background:linear-gradient(to top,var(--sheet-fade),transparent);opacity:1;transition:opacity .22s ease}
  #panel-det.at-end::after{opacity:0}
  .sheet-top{flex:none;padding:9px 14px 11px;touch-action:none;cursor:grab}
  .grip-bar{display:block;width:40px;height:4px;border-radius:3px;background:var(--linea);margin:0 auto 9px}
  .det-head{padding:0;border:0}.d-mun{font-size:1.1rem}.d-sub{font-size:.62rem;margin-top:3px}
  .pk{display:flex;align-items:center;gap:.6rem;margin-top:9px;padding-top:9px;border-top:1px solid var(--linea-2)}
  .pk .pk-chip{width:13px;height:13px;border-radius:3px;flex:none;box-shadow:0 0 0 1px rgba(128,140,148,.35)}
  .pk .pk-lab{font-size:.55rem;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;line-height:1.2;flex:1;min-width:0}
  .pk .pk-lab b{display:block;color:var(--tx);font-size:.74rem;font-weight:600;text-transform:none;letter-spacing:0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pk .pk-val{font-size:1.16rem;font-weight:700;color:var(--tx);white-space:nowrap}
  .pk .pk-val small{font-size:.58rem;font-weight:600;color:var(--suave);margin-left:.15rem}
  .pk .pk-rk{font-size:.54rem;color:var(--suave);text-align:right;line-height:1.3;flex:none}.pk .pk-rk b{color:var(--tx);font-weight:700}
  #panel-det .p-body{flex:1;padding:4px 12px calc(30px + env(safe-area-inset-bottom));overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .k-v{font-size:.9rem}.k-l{font-size:.55rem}.k-c span{font-size:.53rem}
  .p-foot{display:none}
}
</style>
</head>
<body>
<div id="mapbox"><div id="map-wrap"><canvas id="base"></canvas><canvas id="fade"></canvas><canvas id="over"></canvas><canvas id="pick"></canvas></div><div id="catch"></div></div>

<div id="top">
  <div class="logo"><svg viewBox="0 0 200 200"><polygon points="100,10 155,35 191,84 173,142 130,183 69,185 26,143 10,84 45,35" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="7" stroke-linejoin="round"/><polygon points="122,33 156,65 171,110 145,150 102,169 56,156 35,114 36,66 75,39" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="6" stroke-linejoin="round"/><polygon points="129,60 146,89 147,123 120,144 86,148 58,129 52,95 64,63 97,53" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="5" stroke-linejoin="round"/></svg></div>
  <div class="t-tit">
    <div class="t-h"><b>Bolivia:</b> Atlas Fiscal Municipal</div>
    <div class="t-name">Observatorio de Finanzas Públicas y Desarrollo Territorial</div>
  </div>
  <div class="top-sp"></div>
  <div class="yrdd" id="yr-dd">
    <div class="yr">
      <button id="y-prev" aria-label="Año anterior">‹</button>
      <div class="yv" id="y-val" title="Elegir gestión">2025<small>gestión</small></div>
      <button id="y-next" aria-label="Año siguiente">›</button>
    </div>
    <div class="yrdrop" id="yr-drop"></div>
  </div>
  <div class="tbdd" id="dept-dd"><span class="lab">Zoom a</span><button class="tbbtn"><span id="dept-lab">Bolivia</span><span class="ar">▾</span></button><div class="tbdrop" id="dept-drop"></div></div>
  <button class="tbtog" id="theme-btn" aria-label="Cambiar tema" title="Modo oscuro">
    <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 14.6A8.6 8.6 0 0 1 9.4 3.5a8.6 8.6 0 1 0 11.1 11.1Z"/></svg>
    <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4.1"/><path d="M12 2.7v2.1M12 19.2v2.1M2.7 12h2.1M19.2 12h2.1M5.4 5.4l1.5 1.5M17.1 17.1l1.5 1.5M18.6 5.4l-1.5 1.5M6.9 17.1l-1.5 1.5"/></svg>
  </button>
  <div class="t-s">IGF 2016–2025 · <b>343 entidades</b></div>
</div>

<div class="panel" id="panel-ind">
  <div class="cat-bar" id="cat-bar">
    <div class="p-kick"><span>Categoría</span><span class="kick-n" id="kick-n"></span></div>
    <button class="cat-btn" id="cat-btn"><span class="cn">Demografía</span><span class="ar">▾</span></button>
    <div class="cat-drop" id="cat-drop"></div>
  </div>
  <div class="p-body"><div class="p-sub" id="p-sub">elegí un indicador para verlo en el mapa</div><div class="lista" id="lista"></div></div>
  <div class="p-foot">Una iniciativa de <a href="#">CCTD</a><span class="sep">·</span><a href="#">POPULI</a><span class="sep">·</span><a href="#">UPSA</a><br><a href="#">Ir al portal del OFPDT ↗</a></div>
</div>

<div class="panel" id="panel-det">
  <div class="sheet-top" id="sheet-grip">
    <span class="grip-bar"></span>
    <div class="det-head"><div class="d-mun" id="d-mun"></div><div class="d-sub" id="d-sub"></div></div>
    <div class="pk" id="pk"></div>
  </div>
  <div class="p-body"><div id="serie-box"></div><div class="kgrid" id="kgrid"></div></div>
</div>

<div class="zc"><button id="z-in">+</button><button id="z-out">−</button><button id="z-rst">⤢</button></div>

<div class="termo">
  <div class="tm-top"><div class="tm-t" id="tm-t">—</div><div class="tm-st" id="tm-st"></div></div>
  <div class="tm-row"><span class="tm-side" id="tm-lo"></span><div class="tm-bar" id="tm-bar"></div><span class="tm-side" id="tm-hi"></span></div>
</div>

<div id="pop"><div class="pn"></div><div class="pd"></div><div class="pv"><b></b><small></small></div><div class="pr"></div></div>

<script>
// catálogo, datos y años se cargan desde fiscal_catalogo.json / fiscal_data.json
// PALETA: espectro POPULI. A DIFERENCIA del atlas socioeconómico, acá la rampa se ORIENTA
// por la dirección favorable del indicador (campo `dir` del IGF), porque un indicador fiscal
// sí tiene lado bueno y lado malo. Pintar "alto = rojo" siempre mentiría: en Inversión/Gasto
// alto es BUENO. Y para `dir:0` (contexto, como Coparticipación/Ing. Total) va una rampa
// secuencial sin rojo, que no emite juicio.
const ESP=["#00323d","#005f73","#0a9396","#94d2bd","#e9d8a6","#eda13e","#df5d25","#c71e1d","#8f1f22"];
const RAMP_HI_BAD =d3.interpolateRgbBasis(ESP);              // alto = rojo   (dir -1)
const RAMP_HI_GOOD=d3.interpolateRgbBasis([...ESP].reverse());// alto = teal   (dir  1)
const RAMP_NEUTRAL=d3.interpolateRgbBasis(["#efe4c4","#e9d8a6","#94d2bd","#0a9396","#005f73","#00323d"]); // sin juicio (dir 0)
const fmt=(v,u)=>{if(v==null||isNaN(v))return"s/d";
  if(u==="Bs/hab")return d3.format(",")(Math.round(v)).replace(/,/g,".")+" Bs";
  if(u==="%")return(+v).toFixed(1).replace(".",",")+"%";
  return(+v).toFixed(1).replace(".",",")+" "+u;};
const fmtShort=(v,u)=>{if(v==null||isNaN(v))return"";
  if(u==="Bs/hab")return Math.abs(v)>=1000?(v/1000).toFixed(1).replace(".",",")+"k":String(Math.round(v));
  return(+v).toFixed(Math.abs(v)<10?1:0).replace(".",",");};
const sgn=d=>(d>=0?"▲":"▼")+" "+fmt(Math.abs(d),"").trim();
const dpr=Math.min(window.devicePixelRatio||1,2);
const fitC=(cv,w,h,rf)=>{cv.width=w*dpr;cv.height=h*dpr;return cv.getContext("2d",rf?{willReadFrequently:true}:undefined);};

// ── TEMA ── el CSS va por variables; el canvas no, así que sus colores viven acá
const THEME={
  light:{world:"#e8e2d6",worldLine:"#d8d1c1",off:"#ece6da",lineOn:"rgba(11,17,24,.72)",lineOff:"rgba(11,17,24,.16)",
    nd:"#dfe5ea",alpha:.7,miniLine:"rgba(15,22,30,.28)",miniBol:"rgba(12,20,28,.72)",hov:"rgba(0,18,25,.7)",sel:"#e0912a"},
  // OJO: en oscuro la división municipal va OSCURA igual que en claro — una línea clara se difumina
  // contra los tonos claros de la rampa (arena, mint) y se pierde el corte limpio entre municipios.
  // Solo lo que se apoya sobre fondo oscuro (contorno país del minimapa, depto fuera de foco) va claro.
  dark:{world:"#132029",worldLine:"#1e2f39",off:"#182831",lineOn:"rgba(8,14,20,.78)",lineOff:"rgba(214,232,240,.13)",
    nd:"#243440",alpha:.84,miniLine:"rgba(8,14,20,.6)",miniBol:"rgba(232,244,250,.58)",hov:"rgba(255,255,255,.9)",sel:"#f2ad3f"}};
let TH=THEME.light;
const reduceMo=()=>matchMedia("(prefers-reduced-motion:reduce)").matches;
function applyTheme(dark,save){document.body.classList.toggle("dark",dark);TH=dark?THEME.dark:THEME.light;
  const b=document.getElementById("theme-btn");if(b)b.title=dark?"Modo claro":"Modo oscuro";
  if(save){try{localStorage.setItem("atlas-tema",dark?"dark":"light");}catch(_){}}}
// preferencia guardada; si no hay, la del sistema
(()=>{let p=null;try{p=localStorage.getItem("atlas-tema");}catch(_){}
  applyTheme(p?p==="dark":matchMedia("(prefers-color-scheme:dark)").matches,false);})();

Promise.all([fetch("municipios.topojson").then(r=>r.json()),fetch("sudamerica.topojson").then(r=>r.json()),
  fetch("fiscal_catalogo.json").then(r=>r.json()),fetch("fiscal_data.json").then(r=>r.json())]).then(([topo,wtopo,cat,DATA])=>{
  const geo=topojson.feature(topo,topo.objects.data),F=geo.features,bolivia=topojson.merge(topo,topo.objects.data.geometries);
  const world=topojson.feature(wtopo,wtopo.objects.countries).features.filter(w=>{const c=d3.geoCentroid(w);return c[0]>-95&&c[0]<-28&&c[1]>-58&&c[1]<18;});
  const GRUPOS=cat.grupos,YEARS=cat.anios,cache={};let curCat=GRUPOS[0],INDS=curCat.indicadores;
  let yIdx=YEARS.length-1;                       // eje temporal: gestión en pantalla (arranca en la última)
  const byDpto={};for(const s in DATA){const d=DATA[s].dpto;(byDpto[d]=byDpto[d]||[]).push(DATA[s]);}
  const DEPTOS=Object.keys(byDpto).sort(),allRows=Object.values(DATA);
  // promedio nacional/departamental PONDERADO POR POBLACIÓN del año.
  // Para los per cápita esto es exactamente total Bs / total habitantes; para los % es el
  // promedio que vive el boliviano medio (no el municipio medio). Se rotula así en la ficha.
  function agg(rows,ind,yi){let n=0,d=0;
    rows.forEach(r=>{const v=r.s[ind.key][yi],w=r.pob[yi];if(v!=null&&w!=null){n+=v*w;d+=w;}});
    return d?n/d:null;}
  function scale(ind,yi){yi=(yi===undefined?yIdx:yi);const ck=ind.key+"|"+yi;if(cache[ck])return cache[ck];
    const vals=allRows.map(d=>d.s[ind.key][yi]).filter(v=>v!=null&&!isNaN(v)).sort(d3.ascending);
    if(!vals.length)return cache[ck]={vacio:true,color:()=>TH.nd,lo:null,hi:null,med:null,min:null,max:null,avg:null,n:0};
    const lo=d3.quantile(vals,.02),hi=d3.quantile(vals,.98),med=d3.quantile(vals,.5);
    const ramp=ind.dir>0?RAMP_HI_GOOD:ind.dir<0?RAMP_HI_BAD:RAMP_NEUTRAL;
    let dv;
    if(ind.div){        // Resultado Fiscal: el pivote con sentido es el CERO (superávit vs déficit), no la mediana
      const m=Math.max(Math.abs(lo),Math.abs(hi))||1;
      dv=d3.scaleDiverging(ramp).domain([-m,0,m]).clamp(true);
    }else if(ind.dir===0){
      // contexto: rampa sin juicio, pero ANCLADA EN LA MEDIANA igual que las otras.
      // Con una secuencial pura [p2,p98] las distribuciones sesgadas (casi todas las
      // fiscales lo son) apilaban al 80% de los municipios en el extremo pálido y el
      // mapa quedaba en blanco. Centrar en la mediana reparte mitad y mitad.
      dv=d3.scaleDiverging(ramp).domain([lo,med,hi]).clamp(true);
    }else{
      dv=d3.scaleDiverging(ramp).domain([lo,med,hi]).clamp(true);
    }
    const color=v=>v==null||isNaN(v)?TH.nd:dv(v);
    return cache[ck]={lo,hi,med,dv,color,min:vals[0],max:vals[vals.length-1],avg:agg(allRows,ind,yi),n:vals.length};}
  const valOf=(s,k)=>DATA[s]&&DATA[s].s[k]?DATA[s].s[k][yIdx]:null;
  let cur=INDS[0],sel=null,hov=null,zt=d3.zoomIdentity,focusDept=null,zr=d3.zoomIdentity;

  // desplegables
  function wireDrop(barSel,btnSel){const bar=document.getElementById(barSel);
    document.getElementById(btnSel).onclick=e=>{e.stopPropagation();document.querySelectorAll(".cat-bar,.tbdd,.yrdd").forEach(x=>{if(x!==bar)x.classList.remove("open")});bar.classList.toggle("open");};}
  const catBar=document.getElementById("cat-bar");
  function renderCatDrop(){document.getElementById("cat-drop").innerHTML=GRUPOS.map(g=>`<div class="cat-op ${g.key===curCat.key?'on':''}" data-g="${g.key}"><span>${g.label}</span><span class="co-n">${g.indicadores.length}</span></div>`).join("");
    document.querySelectorAll("#cat-drop .cat-op").forEach(op=>op.onclick=()=>setCategory(op.dataset.g));}
  document.querySelector("#cat-btn .cn").textContent=curCat.label;
  wireDrop("cat-bar","cat-btn");
  const deptDD=document.getElementById("dept-dd");
  document.getElementById("dept-drop").innerHTML=[`<div class="tbop on" data-d="">Bolivia (todo)</div>`].concat(DEPTOS.map(d=>`<div class="tbop" data-d="${d}">${d}</div>`)).join("");
  deptDD.querySelector(".tbbtn").onclick=e=>{e.stopPropagation();catBar.classList.remove("open");yrDD.classList.remove("open");deptDD.classList.toggle("open");};
  document.querySelectorAll("#dept-drop .tbop").forEach(op=>op.onclick=()=>{
    document.querySelectorAll("#dept-drop .tbop").forEach(o=>o.classList.remove("on"));op.classList.add("on");
    document.getElementById("dept-lab").textContent=op.dataset.d||"Bolivia";deptDD.classList.remove("open");zoomToDept(op.dataset.d);});
  // ── eje temporal: stepper ‹ 2025 › + desplegable de gestión ──
  const yrDD=document.getElementById("yr-dd");
  document.getElementById("yr-drop").innerHTML=YEARS.map((y,i)=>`<div class="yrop" data-i="${i}">${y}</div>`).join("");
  function setYear(i){i=Math.max(0,Math.min(YEARS.length-1,i));if(i===yIdx)return;yIdx=i;paintYear();}
  function yearChrome(){
    document.getElementById("y-val").innerHTML=YEARS[yIdx]+"<small>gestión</small>";
    document.getElementById("y-prev").disabled=yIdx===0;
    document.getElementById("y-next").disabled=yIdx===YEARS.length-1;
    document.querySelectorAll("#yr-drop .yrop").forEach((o,i)=>o.classList.toggle("on",i===yIdx));}
  function paintYear(){yearChrome();
    buildCards();                       // los mini-mapas son del año en pantalla
    fadeSwap(drawBase);drawOver();termo();
    sel?renderMun(sel.properties.sigep):renderNational();}
  document.getElementById("y-prev").onclick=e=>{e.stopPropagation();setYear(yIdx-1);};
  document.getElementById("y-next").onclick=e=>{e.stopPropagation();setYear(yIdx+1);};
  document.getElementById("y-val").onclick=e=>{e.stopPropagation();
    catBar.classList.remove("open");deptDD.classList.remove("open");yrDD.classList.toggle("open");};
  document.querySelectorAll("#yr-drop .yrop").forEach(o=>o.onclick=e=>{e.stopPropagation();
    yrDD.classList.remove("open");setYear(+o.dataset.i);});
  document.addEventListener("click",()=>{catBar.classList.remove("open");deptDD.classList.remove("open");yrDD.classList.remove("open");});
  document.getElementById("theme-btn").onclick=e=>{e.stopPropagation();
    applyTheme(!document.body.classList.contains("dark"),true);
    buildCards();fadeSwap(drawBase);drawOver();};

  const projMini=d3.geoMercator().fitExtent([[2,2],[108,78]],geo);
  const lista=document.getElementById("lista");
  function buildCards(){lista.innerHTML="";INDS.forEach((ind,i)=>{const sc=scale(ind);
    const el=document.createElement("button");el.className="ind"+(ind.key===cur.key?" on":"");el.dataset.k=ind.key;
    el.style.setProperty("--d",Math.min(i,14)*16+"ms");
    el.innerHTML=`<div><div class="i-nm">${ind.label}</div><div class="i-df">${ind.desc}</div></div>`;
    const cv=document.createElement("canvas");cv.className="mini";el.appendChild(cv);lista.appendChild(el);
    const c=fitC(cv,110,80);c.setTransform(dpr,0,0,dpr,0,0);const p=d3.geoPath(projMini,c);
    F.forEach(f=>{c.beginPath();p(f);c.fillStyle=sc.color(valOf(f.properties.sigep,ind.key));c.fill();c.lineWidth=.22;c.strokeStyle=TH.miniLine;c.stroke();});
    c.beginPath();p(bolivia);c.lineWidth=.75;c.strokeStyle=TH.miniBol;c.stroke();
    el.onclick=()=>select(ind);});}
  const TOT_IND=GRUPOS.reduce((a,g)=>a+g.indicadores.length,0);
  function updateHints(){const kn=document.getElementById("kick-n");if(kn)kn.textContent=`${GRUPOS.length} categorías · ${TOT_IND} indicadores`;
    const ps=document.getElementById("p-sub");if(ps)ps.textContent=`${INDS.length} indicadores · elegí uno para verlo en el mapa`;}
  function setCategory(gkey){const g=GRUPOS.find(x=>x.key===gkey);if(!g)return;curCat=g;INDS=g.indicadores;cur=INDS[0];
    document.querySelector("#cat-btn .cn").textContent=g.label;catBar.classList.remove("open");
    buildCards();renderCatDrop();updateHints();fadeSwap(drawBase);drawOver();termo();sel?renderMun(sel.properties.sigep):renderNational();}

  const wrap=document.getElementById("map-wrap");
  const base=document.getElementById("base"),fade=document.getElementById("fade"),over=document.getElementById("over"),pick=document.getElementById("pick"),catchEl=document.getElementById("catch");
  let bctx,fctx,octx,pctx,proj,W,H,L,R,T,B,idx=new Map();
  function setT(ctx){ctx.setTransform(dpr*zt.k,0,0,dpr*zt.k,dpr*zt.x,dpr*zt.y);}
  // crossfade: congela el mapa actual en #fade, dibuja el nuevo debajo y desvanece el viejo
  function fadeSwap(fn){
    if(!fctx||reduceMo()){fn();return;}
    fctx.setTransform(1,0,0,1,0,0);fctx.clearRect(0,0,fade.width,fade.height);
    try{fctx.drawImage(base,0,0);}catch(_){fn();return;}
    fade.style.transition="none";fade.style.opacity="1";
    fn();
    void fade.offsetWidth;
    fade.style.transition="opacity .45s cubic-bezier(.4,0,.2,1)";fade.style.opacity="0";}
  function drawBase(){const sc=scale(cur);bctx.setTransform(dpr,0,0,dpr,0,0);bctx.clearRect(0,0,W,H);setT(bctx);
    const g=d3.geoPath(proj,bctx);bctx.fillStyle=TH.world;bctx.strokeStyle=TH.worldLine;bctx.lineWidth=.5/zt.k;
    world.forEach(w=>{bctx.beginPath();g(w);bctx.fill();bctx.stroke();});
    F.forEach(f=>{const s=f.properties.sigep,off=focusDept&&DATA[s].dpto!==focusDept;bctx.beginPath();g(f);
      bctx.globalAlpha=off?1:TH.alpha;bctx.fillStyle=off?TH.off:sc.color(valOf(s,cur.key));bctx.fill();bctx.globalAlpha=1;
      bctx.lineWidth=.45/zt.k;bctx.strokeStyle=off?TH.lineOff:TH.lineOn;bctx.stroke();});}
  function drawPick(){pctx.setTransform(dpr,0,0,dpr,0,0);pctx.clearRect(0,0,W,H);setT(pctx);const g=d3.geoPath(proj,pctx);
    F.forEach((f,i)=>{const c=i+1;pctx.beginPath();g(f);pctx.fillStyle=`rgb(${(c>>16)&255},${(c>>8)&255},${c&255})`;pctx.fill();});}
  function drawOver(){octx.setTransform(dpr,0,0,dpr,0,0);octx.clearRect(0,0,W,H);setT(octx);const g=d3.geoPath(proj,octx);
    if(hov){octx.beginPath();g(hov);octx.lineWidth=1/zt.k;octx.strokeStyle=TH.hov;octx.stroke();}
    if(sel){octx.beginPath();g(sel);octx.lineWidth=1.4/zt.k;octx.strokeStyle=TH.sel;octx.stroke();}}
  // el zoom repinta de cero: cortar cualquier crossfade en curso para no arrastrar una imagen vieja
  function render(){zr=zt;wrap.style.transform="none";fade.style.transition="none";fade.style.opacity="0";drawBase();drawPick();drawOver();}
  function cssZoom(){const s=zt.k/zr.k;wrap.style.transformOrigin="0 0";wrap.style.transform="translate("+(zt.x-s*zr.x)+"px,"+(zt.y-s*zr.y)+"px) scale("+s+")";}
  function layout(){sizeSheet();W=wrap.clientWidth;H=wrap.clientHeight;fitC(base,W,H);fitC(fade,W,H);fitC(over,W,H);fitC(pick,W,H,true);
    bctx=base.getContext("2d");fctx=fade.getContext("2d");octx=over.getContext("2d");pctx=pick.getContext("2d",{willReadFrequently:true});
    const mob=innerWidth<=820;L=mob?6:12+328+18;R=W-(mob?6:12+328+18);T=mob?6:62+8;B=H-(mob?6:84);proj=d3.geoMercator().fitExtent([[L,T],[R,B]],geo);
    idx.clear();F.forEach((f,i)=>idx.set(i+1,f));render();}

  const zoom=d3.zoom().scaleExtent([1,12]).on("zoom",e=>{zt=e.transform;cssZoom();}).on("end",()=>render());
  d3.select(catchEl).call(zoom);
  document.getElementById("z-in").onclick=()=>d3.select(catchEl).transition().duration(250).call(zoom.scaleBy,1.6);
  document.getElementById("z-out").onclick=()=>d3.select(catchEl).transition().duration(250).call(zoom.scaleBy,1/1.6);
  document.getElementById("z-rst").onclick=()=>{focusDept=null;document.getElementById("dept-lab").textContent="Bolivia";document.querySelectorAll("#dept-drop .tbop").forEach((o,i)=>o.classList.toggle("on",i===0));drawBase();d3.select(catchEl).transition().duration(350).call(zoom.transform,d3.zoomIdentity);};
  function zoomToDept(dp){focusDept=dp||null;drawBase();drawOver();
    if(!dp){d3.select(catchEl).transition().duration(400).call(zoom.transform,d3.zoomIdentity);return;}
    const feats=F.filter(f=>DATA[f.properties.sigep].dpto===dp),b=d3.geoPath(proj).bounds({type:"FeatureCollection",features:feats});
    const bw=b[1][0]-b[0][0],bh=b[1][1]-b[0][1],cx=(b[0][0]+b[1][0])/2,cy=(b[0][1]+b[1][1])/2;
    const k=Math.max(1,Math.min(12,.86*Math.min((R-L)/bw,(B-T)/bh)));
    const t=d3.zoomIdentity.translate((L+R)/2,(T+B)/2).scale(k).translate(-cx,-cy);
    d3.select(catchEl).transition().duration(500).call(zoom.transform,t);}

  const pop=document.getElementById("pop");
  const pixel=e=>{const r=wrap.getBoundingClientRect();return pctx.getImageData(Math.round((e.clientX-r.left)*dpr),Math.round((e.clientY-r.top)*dpr),1,1).data;};
  // picking robusto: muestrea un bloque y devuelve el municipio válido más cercano al toque (tolera bordes antialiaseados y municipios chicos)
  function featAt(e){const r=wrap.getBoundingClientRect(),x=Math.round((e.clientX-r.left)*dpr),y=Math.round((e.clientY-r.top)*dpr);
    const rad=Math.round(7*dpr),x0=Math.max(0,x-rad),y0=Math.max(0,y-rad),x1=Math.min(pick.width-1,x+rad),y1=Math.min(pick.height-1,y+rad);
    const bw=x1-x0+1,bh=y1-y0+1;if(bw<1||bh<1)return null;
    const img=pctx.getImageData(x0,y0,bw,bh).data,cx=x-x0,cy=y-y0;let best=null,bd=1e18;
    for(let j=0;j<bh;j++)for(let i=0;i<bw;i++){const o=(j*bw+i)<<2;if(img[o+3]===0)continue;const f=idx.get((img[o]<<16)+(img[o+1]<<8)+img[o+2]);if(!f)continue;const d=(i-cx)*(i-cx)+(j-cy)*(j-cy);if(d<bd){bd=d;best=f;}}
    return best;}
  catchEl.addEventListener("mousemove",e=>{if(innerWidth<=820){pop.style.opacity=0;return;}const px=pixel(e),f=idx.get((px[0]<<16)+(px[1]<<8)+px[2])||null;
    if(f!==hov){hov=f;drawOver();}
    if(f){const sig=f.properties.sigep,d=DATA[sig],sc=scale(cur),v=d.s[cur.key][yIdx],rk=rankOf(sig);
      pop.querySelector(".pn").textContent=d.nombre;pop.querySelector(".pd").textContent=d.dpto+" · "+cur.label+" · "+YEARS[yIdx];
      pop.querySelector(".pv b").textContent=fmt(v,cur.unit);pop.querySelector(".pv small").textContent=v==null?"":cur.unit;
      pop.querySelector(".pr").innerHTML=`<span>${rk?`Puesto <b>${rk.pos}</b>/${rk.n}`:"Sin dato"}</span>`
        +`<span>${v!=null&&sc.avg!=null?`vs. país <b>${sgn(v-sc.avg)}</b>`:""}</span>`;
      pop.style.opacity=1;pop.style.left=Math.min(e.clientX+16,innerWidth-200)+"px";pop.style.top=Math.min(e.clientY+16,innerHeight-110)+"px";
    }else pop.style.opacity=0;});
  catchEl.addEventListener("mouseleave",()=>{hov=null;drawOver();pop.style.opacity=0;});
  let _tapXY=null;
  catchEl.addEventListener("pointerdown",e=>{_tapXY=[e.clientX,e.clientY];});
  catchEl.addEventListener("pointerup",e=>{if(!_tapXY)return;const mv=Math.hypot(e.clientX-_tapXY[0],e.clientY-_tapXY[1]);_tapXY=null;if(mv>8)return;const f=featAt(e);if(f){sel=f;drawOver();renderMun(f.properties.sigep);}else renderNational();});

  const termoEl=document.querySelector(".termo");
  function termo(){const sc=scale(cur);
    if(!reduceMo()){termoEl.classList.remove("swap");void termoEl.offsetWidth;termoEl.classList.add("swap");}
    const ramp=cur.dir>0?RAMP_HI_GOOD:cur.dir<0?RAMP_HI_BAD:RAMP_NEUTRAL;
    document.getElementById("tm-t").innerHTML=cur.label+` <small>${cur.unit} · ${YEARS[yIdx]}</small>`;
    document.getElementById("tm-bar").style.background=`linear-gradient(to right,${d3.range(0,1.001,.04).map(t=>ramp(t)).join(",")})`;
    // los extremos rotulados deben ser los del DOMINIO pintado, no los p2/p98 crudos:
    // en los indicadores de pivote cero el dominio es simétrico ±m y decir "-36,2 / +35,0" mentiría
    const d0=sc.dv?sc.dv.domain():[sc.lo,sc.med,sc.hi];
    document.getElementById("tm-lo").innerHTML=`<span class="cap">≤ </span>${fmt(d0[0],cur.unit)}`;
    document.getElementById("tm-hi").innerHTML=`<span class="cap">≥ </span>${fmt(d0[d0.length-1],cur.unit)}`;
    const bar=document.getElementById("tm-bar");bar.querySelectorAll(".tm-mk").forEach(m=>m.remove());
    // la marca central solo tiene sentido si hay pivote: cero (resultado fiscal) o mediana.
    // En los indicadores de contexto (dir 0) la rampa es secuencial y no hay pivote que marcar.
    if(cur.dir!==0){const m=document.createElement("div");m.className="tm-mk";m.style.left="50%";
      m.title=cur.div?"cero":"mediana";bar.appendChild(m);}
    document.getElementById("tm-st").innerHTML=`n <b>${sc.n}</b> · mín <b>${fmt(sc.min,cur.unit)}</b> · med <b>${fmt(sc.med,cur.unit)}</b> · máx <b>${fmt(sc.max,cur.unit)}</b>`;}

  // cambiar de indicador NO reconstruye la ficha (evita el parpadeo y conserva el scroll):
  // solo mueve el resalte, repinta el mapa con crossfade y actualiza el bloque peek
  function select(ind){cur=ind;
    document.querySelectorAll(".ind").forEach(c=>c.classList.toggle("on",c.dataset.k===ind.key));
    document.querySelectorAll("#kgrid .kpi").forEach(el=>el.classList.toggle("on",el.dataset.k===ind.key));
    fadeSwap(drawBase);drawOver();termo();
    renderSerie(sel?sel.properties.sigep:null);
    if(sel)renderPeek(sel.properties.sigep);}

  const cls=x=>x>=0?"up":"dn";

  // ── SERIE 2016–2025 del indicador en pantalla, contra el promedio nacional ──
  // sig=null -> resumen nacional: la serie nacional pasa a ser la línea principal.
  const SR_W=260,SR_H=96,SR_L=27,SR_R=7,SR_T=9,SR_B=15;
  function linePath(arr,x,y){let d="",pen=false;
    arr.forEach((v,i)=>{if(v==null||isNaN(v)){pen=false;return;}
      d+=(pen?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" ";pen=true;});
    return d.trim();}
  function renderSerie(sig){
    const box=document.getElementById("serie-box");
    const nat=YEARS.map((_,i)=>agg(allRows,cur,i));
    const mu=sig?DATA[sig].s[cur.key]:null;
    const solo=!sig;                                   // nacional: una sola línea
    const vals=(mu||[]).concat(nat).filter(v=>v!=null&&!isNaN(v));
    if(!vals.length){box.innerHTML="";return;}
    let lo=d3.min(vals),hi=d3.max(vals);
    if(cur.div){const m=Math.max(Math.abs(lo),Math.abs(hi));lo=Math.min(lo,-m*.08);hi=Math.max(hi,m*.08);}
    if(lo===hi){lo-=1;hi+=1;}
    const pad=(hi-lo)*.12;lo-=pad;hi+=pad;
    const x=i=>SR_L+i*(SR_W-SR_L-SR_R)/(YEARS.length-1);
    const y=v=>SR_H-SR_B-(v-lo)/(hi-lo)*(SR_H-SR_T-SR_B);
    let g="";
    // rejilla + rótulos del eje y en valores REDONDOS (d3.ticks), no en los extremos crudos
    d3.ticks(lo+pad*.5,hi-pad*.5,3).forEach(v=>{
      g+=`<line class="gl" x1="${SR_L}" y1="${y(v).toFixed(1)}" x2="${SR_W-SR_R}" y2="${y(v).toFixed(1)}"/>`
       +`<text class="ax" x="${SR_L-4}" y="${(y(v)+2.6).toFixed(1)}" text-anchor="end">${fmtShort(v,cur.unit)}</text>`;});
    if(lo<0&&hi>0)g+=`<line class="zero" x1="${SR_L}" y1="${y(0).toFixed(1)}" x2="${SR_W-SR_R}" y2="${y(0).toFixed(1)}"/>`;
    // años: primero, último y el que está en pantalla
    new Set([0,YEARS.length-1,yIdx]).forEach(i=>{
      g+=`<text class="ax" x="${x(i).toFixed(1)}" y="${SR_H-4}" text-anchor="${i===0?'start':i===YEARS.length-1?'end':'middle'}"${i===yIdx?' style="fill:var(--warm);font-weight:800"':''}>${YEARS[i]}</text>`;});
    // línea del promedio nacional (punteada) — principal si no hay municipio
    g+=`<path class="${solo?'ln-mu':'ln-na'}" d="${linePath(nat,x,y)}"/>`;
    if(mu)g+=`<path class="ln-mu" d="${linePath(mu,x,y)}"/>`;
    const serie=solo?nat:mu;
    serie.forEach((v,i)=>{if(v==null||isNaN(v))return;
      g+=`<circle class="${i===yIdx?'dot-now':'dot'}" cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="${i===yIdx?3.1:1.5}"/>`;});
    const huecos=serie.filter(v=>v==null).length;
    box.innerHTML=`<div class="serie">
      <div class="sr-top"><div class="sr-t">${cur.label}</div><div class="sr-u">${cur.unit}</div></div>
      <div class="sr-lg">${solo?'':'<span class="mu"><i></i>'+DATA[sig].nombre+'</span>'}<span class="na"><i></i>Promedio nacional</span></div>
      <svg class="sr-svg" viewBox="0 0 ${SR_W} ${SR_H}" role="img" aria-label="Serie ${YEARS[0]}–${YEARS[YEARS.length-1]}">${g}</svg>
      <div class="sr-foot">Promedio nacional ponderado por población.${huecos?' '+huecos+' gestión(es) sin dato.':''}</div>
    </div>`;}
  function wireKpi(){document.querySelectorAll("#kgrid .kpi").forEach(el=>el.onclick=()=>select(INDS.find(i=>i.key===el.dataset.k)));}
  // ── ficha = bottom-sheet deslizable en móvil (peek / full / hidden) ──
  const sheet=document.getElementById("panel-det"),grip=document.getElementById("sheet-grip");
  const isMob=()=>innerWidth<=820;
  let sheetState="hidden";
  const peekPx=()=>parseInt(getComputedStyle(document.documentElement).getPropertyValue("--peek"))||138;
  const detBody=sheet.querySelector(".p-body");
  // el sheet mide EXACTAMENTE lo que se ve en el detent "full" (translateY=0): así nada queda bajo la pantalla
  function sizeSheet(){if(!isMob()){sheet.style.height="";return;}sheet.style.height=Math.round(innerHeight*.74)+"px";}
  function detentY(s){const H=sheet.clientHeight;if(s==="full")return 0;if(s==="peek")return Math.max(0,H-peekPx());return H;}
  function checkEnd(){sheet.classList.toggle("at-end",detBody.scrollTop+detBody.clientHeight>=detBody.scrollHeight-4);}
  detBody.addEventListener("scroll",checkEnd,{passive:true});
  const resetScroll=()=>{detBody.scrollTop=0;requestAnimationFrame(checkEnd);};
  function setSheet(s){
    if(!isMob()){sheet.style.transform="";document.body.classList.remove("sheet-open");return;}
    sheetState=s;sheet.style.transform="translateY("+detentY(s)+"px)";
    document.body.classList.toggle("sheet-open",s!=="hidden");}
  function setDetailVisible(v){if(!isMob())return;if(v){if(sheetState==="hidden")setSheet("peek");}else setSheet("hidden");}
  const curY=()=>{const m=/translateY\(([-\d.]+)px\)/.exec(sheet.style.transform);return m?parseFloat(m[1]):detentY("hidden");};
  let dg=false,dY0=0,dT0=0,dMv=0;
  grip.addEventListener("pointerdown",e=>{if(!isMob())return;dg=true;dY0=e.clientY;dT0=curY();dMv=0;sheet.classList.add("dragging");try{grip.setPointerCapture(e.pointerId);}catch(_){}});
  grip.addEventListener("pointermove",e=>{if(!dg)return;dMv=Math.max(dMv,Math.abs(e.clientY-dY0));const y=Math.max(detentY("full"),Math.min(sheet.clientHeight,dT0+(e.clientY-dY0)));sheet.style.transform="translateY("+y+"px)";});
  function endDrag(){if(!dg)return;dg=false;sheet.classList.remove("dragging");
    if(dMv<6){setSheet(sheetState==="full"?"peek":"full");return;}
    const y=curY(),cand=[["full",detentY("full")],["peek",detentY("peek")],["hidden",sheet.clientHeight]];
    let best=cand[0],bd=1e9;cand.forEach(c=>{const d=Math.abs(c[1]-y);if(d<bd){bd=d;best=c;}});
    if(best[0]==="hidden")renderNational();else setSheet(best[0]);}
  grip.addEventListener("pointerup",endDrag);grip.addEventListener("pointercancel",endDrag);
  function renderNational(){setDetailVisible(false);sel=null;drawOver();
    document.getElementById("panel-det").style.display="flex";
    document.getElementById("d-mun").textContent="Bolivia";
    document.getElementById("d-sub").innerHTML=`Resumen nacional · gestión <b>${YEARS[yIdx]}</b> · 343 entidades`;
    renderSerie(null);
    document.getElementById("kgrid").innerHTML=INDS.map((ind,i)=>{const sc=scale(ind);
      return `<div class="kpi ${ind.key===cur.key?'on':''}" data-k="${ind.key}" style="--d:${Math.min(i,14)*14}ms">
        <div class="k-l">${ind.label}</div><div class="k-v">${fmt(agg(allRows,ind,yIdx),ind.unit)}</div>
        <div class="k-c"><span>mín <b>${fmt(sc.min,ind.unit)}</b></span><span>máx <b>${fmt(sc.max,ind.unit)}</b></span></div></div>`;}).join("");
    wireKpi();resetScroll();}
  function renderMun(sig){const r=DATA[sig];if(!r)return;setDetailVisible(true);
    document.getElementById("panel-det").style.display="flex";
    document.getElementById("d-mun").textContent=r.nombre;
    document.getElementById("d-sub").innerHTML=`${r.prov}, ${r.dpto} · gestión <b>${YEARS[yIdx]}</b>`
      +`<span class="d-links">`
      +(r.dash?`<a class="back" href="${r.dash}" target="_blank" rel="noopener">perfil completo ↗</a><span class="sep">·</span>`:"")
      +`<a class="back" id="back-nac">‹ resumen nacional</a></span>`;
    document.getElementById("back-nac").onclick=renderNational;
    renderSerie(sig);
    document.getElementById("kgrid").innerHTML=INDS.map((ind,i)=>{
      const vv=r.s[ind.key][yIdx],dv=agg(byDpto[r.dpto],ind,yIdx),nv=agg(allRows,ind,yIdx);
      const c1=vv==null||dv==null?"vs. depto <b>s/d</b>":`vs. depto <b class="${cls(vv-dv)}">${sgn(vv-dv)}</b>`;
      const c2=vv==null||nv==null?"vs. país <b>s/d</b>":`vs. país <b class="${cls(vv-nv)}">${sgn(vv-nv)}</b>`;
      return `<div class="kpi ${ind.key===cur.key?'on':''}" data-k="${ind.key}" style="--d:${Math.min(i,14)*14}ms">
        <div class="k-l">${ind.label}</div><div class="k-v">${fmt(vv,ind.unit)}</div>
        <div class="k-c"><span>${c1}</span><span>${c2}</span></div></div>`;}).join("");
    renderPeek(sig);wireKpi();resetScroll();}
  // bloque "peek": lo único de la ficha que depende del indicador en pantalla
  // el ranking se ordena según la dirección favorable: puesto 1 = el mejor, no "el más alto"
  function rankOf(sig){const k=cur.key,v=DATA[sig].s[k][yIdx];if(v==null)return null;
    const arr=allRows.map(x=>x.s[k][yIdx]).filter(x=>x!=null).sort(cur.dir<0?d3.ascending:d3.descending);
    return{pos:arr.indexOf(v)+1,n:arr.length};}
  function renderPeek(sig){const r=DATA[sig];if(!r)return;
    const psc=scale(cur),v=r.s[cur.key][yIdx],rk=rankOf(sig);
    document.getElementById("pk").innerHTML=`<span class="pk-chip" style="background:${psc.color(v)}"></span>`
      +`<span class="pk-lab">Indicador en pantalla<b>${cur.label}</b></span>`
      +`<span class="pk-val">${fmt(v,cur.unit)}</span>`
      +`<span class="pk-rk">${rk?`Puesto <b>${rk.pos}</b>/${rk.n}`:"Sin dato"}<br>${v!=null&&psc.avg!=null?`vs. país <b>${sgn(v-psc.avg)}</b>`:""}</span>`;}

  let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(()=>{layout();setSheet(isMob()?sheetState:"hidden");},120);});
  yearChrome();buildCards();renderCatDrop();updateHints();layout();termo();renderNational();
});
</script>
</body>
</html>
